<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paycheck Calculator — Open Source</title>
    <meta name="description"
        content="Open-source paycheck estimation module. Calculate federal tax, FICA, and take-home pay using 2026 US tax brackets.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 520px;
            text-align: center
        }

        h1 {
            font-size: 1.6rem;
            color: #f0f6fc;
            margin-bottom: .75rem
        }

        p {
            line-height: 1.6;
            margin-bottom: 1.25rem;
            color: #8b949e
        }

        .btn {
            display: inline-block;
            background: #238636;
            color: #fff;
            padding: 12px 28px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background .2s
        }

        .btn:hover {
            background: #2ea043
        }

        .meta {
            margin-top: 1.5rem;
            font-size: .8rem;
            color: #484f58
        }

        .meta a {
            color: #58a6ff;
            text-decoration: none
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🧾 Paycheck Calculator</h1>
        <p>Open-source JavaScript module for estimating US take-home pay. Progressive federal tax brackets, FICA
            calculation, and net pay breakdown.</p>
        <a class="btn" href="https://paycheckwiz.com">Free Paycheck Calculator →</a>
        <p class="meta">Built by <a href="https://www.linkedin.com/in/mohamed-skhiri-365a36218/">Mohamed Skhiri</a> ·
            MIT License</p>
    </div>
</body>

</html>
